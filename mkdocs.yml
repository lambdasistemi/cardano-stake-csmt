site_name: Cardano Stake CSMT
site_description: Stake distribution service scaffold for Cardano CSMT roots and proofs.
repo_url: https://github.com/lambdasistemi/cardano-stake-csmt
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
