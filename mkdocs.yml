site_name: Cardano Stake CSMT
site_url: https://lambdasistemi.github.io/cardano-stake-csmt/
site_description: Cardano stake distribution service for per-epoch CSMT roots and proofs.
repo_url: https://github.com/lambdasistemi/cardano-stake-csmt
strict: true

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - API and proofs: api-proofs.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
