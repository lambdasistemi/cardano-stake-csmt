name: Deploy docs

on:
  pull_request:
    paths:
      - .github/workflows/deploy-docs.yml
      - docs/**
      - mkdocs.yml
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-docs.yml
      - docs/**
      - mkdocs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Strict MkDocs build
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
      - name: Build documentation
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict --site-dir site
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          path: site

  deploy:
    name: Deploy docs
    runs-on: nixos
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
