name: Darwin Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/darwin-release.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "scripts/release/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        type: choice
        options: ["release", "dev-homebrew"]
        default: "release"
      tag:
        description: "Existing tag to build for release mode, for example v0.1.0.0"
        required: false
        type: string
      publish:
        description: "Release mode only: upload to the GitHub release and update Homebrew"
        type: choice
        options: ["no", "yes"]
        default: "no"
      update_tap:
        description: "Dev Homebrew mode only: update lambdasistemi/homebrew-tap"
        type: choice
        options: ["no", "yes"]
        default: "no"

permissions:
  contents: write

concurrency:
  group: >-
    darwin-release-${{
      github.ref_type == 'tag' && github.ref_name
      || inputs.tag
      || github.ref
    }}-${{ inputs.mode || github.event_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build aarch64-darwin artifacts
    runs-on: macos-14
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      MODE: >-
        ${{
          github.event_name == 'pull_request' && 'dev-homebrew'
          || inputs.mode
          || 'release'
        }}
      PUBLISH: >-
        ${{
          github.event_name == 'push'
          || (inputs.mode != 'dev-homebrew' && inputs.publish == 'yes')
        }}
      UPDATE_TAP: >-
        ${{
          github.event_name == 'pull_request' && 'no'
          || inputs.update_tap
          || 'no'
        }}
      DEV_TAG: dev-homebrew
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: >-
            ${{
              github.ref_type == 'tag' && github.ref_name
              || inputs.tag
              || github.ref
            }}

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://cache.iog.io https://paolino.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build, smoke-test, and optionally publish Darwin Homebrew artifacts
        uses: paolino/dev-assets/darwin-homebrew-release@6864b20eb75c3578796e7f667562b5aea8780643
        with:
          mode: ${{ env.MODE }}
          tag: ${{ env.TAG }}
          publish: ${{ env.PUBLISH }}
          update-tap: ${{ env.UPDATE_TAP }}
          dev-tag: ${{ env.DEV_TAG }}
          release-package: darwin-release-artifacts
          dev-package: darwin-dev-homebrew-artifacts
          release-formula: cardano-stake-csmt.rb
          dev-formula: cardano-stake-csmt-dev.rb
          release-artifact-name: darwin-release-bundle
          dev-artifact-name: darwin-dev-homebrew-artifacts
          tarball-pattern: cardano-stake-csmt-*-aarch64-darwin.tar.gz
          installed-commands: cardano-stake-csmt
          cleanup-formulae: cardano-stake-csmt cardano-stake-csmt-dev
          tap-name: lambdasistemi/tap
          tap-repository: lambdasistemi/homebrew-tap
          github-token: ${{ github.token }}
          tap-token: ${{ secrets.TAP_TOKEN }}
          release-check-command: 'scripts/release/check-version-consistency "$TAG"'
          release-notes-command: 'scripts/release/extract-notes "$TAG"'
          release-title: cardano-stake-csmt ${{ env.TAG }}
          dev-release-title: cardano-stake-csmt dev Homebrew
          tarball-smoke-script: |
            smoke_server() {
              log="$(mktemp)"
              if curl -fsS --max-time 1 http://127.0.0.1:8080/ready >/dev/null 2>&1; then
                echo "port 8080 already has a service on /ready" >&2
                exit 1
              fi
              cardano-stake-csmt >"$log" 2>&1 &
              pid="$!"
              trap 'kill "$pid" >/dev/null 2>&1 || true' EXIT
              attempts=0
              while [ "$attempts" -lt 60 ]; do
                attempts=$((attempts + 1))
                if ! kill -0 "$pid" 2>/dev/null; then
                  cat "$log" >&2
                  exit 1
                fi
                ready="$(curl -fsS --max-time 1 http://127.0.0.1:8080/ready 2>/dev/null || true)"
                if [ -n "$ready" ]; then
                  printf '%s\n' "$ready" | grep -F '"ready":true'
                  curl -fsS --max-time 1 http://127.0.0.1:8080/health | grep -Fx ok
                  kill "$pid" >/dev/null 2>&1 || true
                  wait "$pid" 2>/dev/null || true
                  trap - EXIT
                  return
                fi
                sleep 1
              done
              cat "$log" >&2
              exit 1
            }
            smoke_server
          brew-smoke-script: |
            smoke_server() {
              log="$(mktemp)"
              if curl -fsS --max-time 1 http://127.0.0.1:8080/ready >/dev/null 2>&1; then
                echo "port 8080 already has a service on /ready" >&2
                exit 1
              fi
              cardano-stake-csmt >"$log" 2>&1 &
              pid="$!"
              trap 'kill "$pid" >/dev/null 2>&1 || true' EXIT
              attempts=0
              while [ "$attempts" -lt 60 ]; do
                attempts=$((attempts + 1))
                if ! kill -0 "$pid" 2>/dev/null; then
                  cat "$log" >&2
                  exit 1
                fi
                ready="$(curl -fsS --max-time 1 http://127.0.0.1:8080/ready 2>/dev/null || true)"
                if [ -n "$ready" ]; then
                  printf '%s\n' "$ready" | grep -F '"ready":true'
                  curl -fsS --max-time 1 http://127.0.0.1:8080/health | grep -Fx ok
                  kill "$pid" >/dev/null 2>&1 || true
                  wait "$pid" 2>/dev/null || true
                  trap - EXIT
                  return
                fi
                sleep 1
              done
              cat "$log" >&2
              exit 1
            }
            smoke_server
            otool -L "$(which cardano-stake-csmt)"
