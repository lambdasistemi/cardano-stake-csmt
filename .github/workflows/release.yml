name: Linux Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "scripts/release/**"
      - "CHANGELOG.md"
      - "README.md"
      - "docs/getting-started.md"
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        default: release
        type: choice
        options:
          - release
          - dev-linux
      tag:
        description: "Existing release tag, for example v0.1.0.0"
        required: false
        type: string
      publish:
        description: "Upload release assets when mode=release"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

permissions:
  contents: write

concurrency:
  group: linux-release-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name || inputs.tag || inputs.mode }}
  cancel-in-progress: false

jobs:
  linux-bundles:
    name: Build Linux release bundles
    runs-on: nixos
    env:
      MODE: ${{ github.event_name == 'pull_request' && 'dev-linux' || inputs.mode || 'release' }}
      PUBLISH: ${{ github.event_name == 'push' && 'yes' || inputs.publish || 'no' }}
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || github.ref }}

      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate release mode
        run: |
          set -euo pipefail
          case "$MODE" in
            release)
              if [ -z "${TAG:-}" ]; then
                echo "release mode requires a v* tag from a tag push or the tag input" >&2
                exit 1
              fi
              case "$TAG" in
                v*) ;;
                *)
                  echo "release mode tag must start with v: $TAG" >&2
                  exit 1
                  ;;
              esac
              scripts/release/check-version-consistency "$TAG"
              ;;
            dev-linux)
              ;;
            *)
              echo "unsupported release mode: $MODE" >&2
              exit 1
              ;;
          esac

      - name: Build and smoke-test Linux artifacts
        id: linux-artifacts
        run: |
          set -euo pipefail

          case "$MODE" in
            release)
              artifact_version="$(scripts/release/get-cabal-version)"
              package_output="linux-release-artifacts"
              artifact_name="linux-release-bundles"
              ;;
            dev-linux)
              artifact_version="$(scripts/release/get-cabal-version)-$(git rev-parse --short=7 HEAD)"
              package_output="linux-dev-release-artifacts"
              artifact_name="linux-dev-release-bundles"
              ;;
            *)
              echo "unsupported release mode: $MODE" >&2
              exit 1
              ;;
          esac

          nix build --quiet ".#$package_output"
          artifact_dir="$(readlink -f result)"
          nix run --quiet .#linux-artifact-smoke -- \
            --artifacts-dir "$artifact_dir" \
            --artifact-version "$artifact_version"

          ls -lh "$artifact_dir"

          {
            echo "artifact_name=$artifact_name"
            echo "artifact_version=$artifact_version"
            echo "artifact_dir=$artifact_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.linux-artifacts.outputs.artifact_name }}
          path: ${{ steps.linux-artifacts.outputs.artifact_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Create release and upload artifacts
        if: env.MODE == 'release' && env.PUBLISH == 'yes'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          scripts/release/extract-notes "$TAG" > "$notes"
          gh=(nix --quiet shell nixpkgs#gh -c gh)
          "${gh[@]}" release view "$TAG" >/dev/null 2>&1 \
            || "${gh[@]}" release create "$TAG" \
              --title "cardano-stake-csmt $TAG" \
              --notes-file "$notes" \
            || "${gh[@]}" release view "$TAG" >/dev/null
          "${gh[@]}" release upload "$TAG" "${{ steps.linux-artifacts.outputs.artifact_dir }}"/* --clobber
